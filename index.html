<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Kiwi Shooter 🐦</title>
  <link rel="stylesheet" href="style.css"/>
  <script>
    if (window.location.search.indexOf('play=1') === -1) {
      window.location.replace('menu.html');
    }
    // บล็อก pinch zoom
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); });
  </script>
</head>
<body>

  <!-- หน้าบอกหมุนจอ -->
  <div id="rotateScreen" style="
    display:none;position:fixed;inset:0;z-index:99999;
    background:#0f172a;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;
    font-family:system-ui,sans-serif;
  ">
    <div style="font-size:4rem;animation:spin 1.5s ease-in-out infinite alternate">📱</div>
    <div style="font-size:1rem;font-weight:700;color:#f1f5f9">กรุณาหมุนจอเป็นแนวนอน</div>
    <div style="font-size:.75rem;color:#94a3b8">เกมนี้เล่นได้ในโหมด Landscape เท่านั้น</div>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(90deg); }
      }
    </style>
  </div>

  <!-- HUD -->
  <header class="hud">
    <div class="hud-block">
      <span class="hud-label">💰 เงิน</span>
      <span class="hud-value" id="money">0</span>
    </div>
    <div class="hud-center">
      <span class="game-title">KIWI SHOOTER</span>
    </div>
    <div class="hud-block" style="flex-direction:row;gap:8px;align-items:center">
      <div style="display:flex;flex-direction:column;align-items:center">
        <span class="hud-label">⭐ เควส</span>
        <span class="hud-value" id="questCount">0/0</span>
      </div>
      <button onclick="goMenu()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#94a3b8;border-radius:8px;padding:4px 8px;font-size:.65rem;cursor:pointer;-webkit-tap-highlight-color:transparent">☰</button>
    </div>
  </header>

  <!-- Game area -->
  <div class="game-area" id="gameArea">
    <div class="crosshair" id="crosshair">+</div>
  </div>

  <!-- Side panels -->
  <aside class="panel panel-left">
    <h2 class="panel-title">🛍️ ไอเทม</h2>
    <div id="itemList"></div>
  </aside>
  <aside class="panel panel-right">
    <h2 class="panel-title">📋 เควส</h2>
    <div id="questList"></div>
  </aside>

  <!-- Bottom bar -->
  <div class="bottom-bar" id="bottomBar">
    <div class="bottom-tabs">
      <button class="bottom-tab active" id="tabItem" onclick="switchTab('item')">🛍️ ไอเทม</button>
      <button class="bottom-tab" id="tabQuest" onclick="switchTab('quest')">📋 เควส</button>
    </div>
    <div class="bottom-content" id="bottomContent"></div>
  </div>

  <!-- Flash -->
  <div class="multiplier-flash" id="multFlash"></div>

  <script src="save.js"></script>
  <script src="game.js"></script>
  <script>
    function goMenu() {
      window.location.href = 'menu.html';
    }

    // Landscape lock
    function tryLock() {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function(){});
      }
    }
    tryLock();
    document.addEventListener('touchstart', tryLock, { once: true });

    // แสดง/ซ่อนหน้าหมุนจอ
    function checkOrientation() {
      var rs = document.getElementById('rotateScreen');
      if (!rs) return;
      var isLandscape = window.innerWidth > window.innerHeight;
      rs.style.display = isLandscape ? 'none' : 'flex';
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', function(){
      setTimeout(checkOrientation, 300);
    });
    checkOrientation();
  </script>
</body>
</html>
